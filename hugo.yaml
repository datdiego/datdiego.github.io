baseURL: https://datdiego.github.io/
languageCode: en-us
title: diego
copyright: "© Diego Alducin 2025"
paginate: 5
theme: ["PaperMod"]

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts", "quant", "QuantumFinance", "datdiego"]

minify:
  disableXML: true
  # minifyOutput: true

taxonomies:
    category: categories
    tag: tags
    series: series
menu:
    main:
      - name: Archive
        url: archives
        weight: 5
      - name: Search
        url: search/
        weight: 10
      - name: Tags
        url: tags/
        weight: 10
      - name: About Me
        url: about/
        weight: 15



params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  description: "ramblings of a scientist"
  author: Diego Alducin
  # author: ["Me", "You"] # multiple authors

  defaultTheme: auto
  # disableThemeToggle: true
  ShowShareButtons: true
  ShowReadingTime: true
  # disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  # comments: false
  images: ["images/papermod-cover.png"]

  homeInfoParams:
    Title: "hi!"
    Content: >
      Here, I share my thoughts, experiences, and projects as a scientist. 

  socialIcons:
    - name: github
      title: View Source on Github
      url: "https://github.com/datdiego/"
    - name: Kaggle
      title: Learn more. OK, Got it.
      url: "https://www.kaggle.com/ddelta"
    - name: KoFi
      title: Buy me a Ko-Fi :)
      url: "https://ko-fi.com/"

assets:
    disableHLJS: true
        favicon: "../images/favicon.ico"
        favicon16x16: "../images/favicon-16x16.png"
        favicon32x32: "../images/favicon-32x32.png"
        apple_touch_icon: "../images/apple-touch-icon.png"
  #     safari_pinned_tab: "<link / abs url>"